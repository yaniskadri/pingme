<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PingMe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <p class="eyebrow">Discord Relay</p>
        <h1>Send a message to the MASSE team channel.</h1>

        <form id="ping-form" class="form" novalidate>
          <label for="username">Display Name (optional)</label>
          <input
            id="username"
            name="username"
            type="text"
            maxlength="80"
            placeholder="Jane from Support"
          />

          <div class="row-between">
            <label for="message">Message</label>
            <span id="char-count">0 / 1900</span>
          </div>
          <textarea
            id="message"
            name="message"
            rows="6"
            maxlength="1900"
            required
            placeholder="Type your message for Discord..."
          ></textarea>

          <button id="submit-btn" type="submit">Send to Discord</button>
          <p id="status" class="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
